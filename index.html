var N=[];
var open={};

function days(s){
  try{
    var a=new Date(s),b=new Date();
    a.setHours(0,0,0,0);b.setHours(0,0,0,0);
    return Math.round((b-a)/86400000);
  }catch(e){return 0;}
}
function age(d){
  if(d<=0)return{l:'Hoy',c:'#00c97a'};
  if(d===1)return{l:'Ayer',c:'#00c97a'};
  if(d<=7)return{l:d+' dias',c:'#f5a623'};
  if(d<=14)return{l:d+' dias',c:'#ff6b35'};
  return{l:d+' dias',c:'#c00'};
}
function pri(s){
  if(!s)return 0;
  return parseFloat(s.replace('EUR','').replace(',','.').trim())||0;
}
function card(p){
  var d=days(p.found_at),a=age(d),isN=(N.indexOf(p.handle)!==-1);
  var img=p.image_url
    ?'<img class="cimg" src="'+p.image_url+'" loading="lazy" onerror="this.style.display='none'">'
    :'<div class="nimg">Sin imagen</div>';
  var np=isN?'<div class="npill">NUEVO</div>':'';
  var pr=p.price?'<div class="cpri">'+p.price+'</div>':'';
  return '<div class="card'+(isN?' isnew':'')+'">'
    +'<div style="position:relative">'+img+np
    +'<span class="abadge" style="background:'+a.c+'">'+a.l+'</span>'
    +'</div><div class="cinfo">'
    +'<div class="cbr">'+p.brand+'</div>'
    +'<div class="ctit">'+p.title+'</div>'
    +pr
    +'<a class="clink" href="'+p.url+'" target="_blank">Ver producto</a>'
    +'</div></div>';
}
function tog(el){
  var idx=el.getAttribute("data-idx");
  var b=document.getElementById("b"+idx);
  var a=document.getElementById("a"+idx);
  if(!b)return;
  var o=b.style.display==="block";
  b.style.display=o?"none":"block";
  a.style.transform=o?"rotate(0)":"rotate(180deg)";
}
function xall(v){
  document.querySelectorAll('[id^="b"]').forEach(function(el){
    if(el.id.length>1){el.style.display=v?'block':'none';}
  });
  document.querySelectorAll('[id^="a"]').forEach(function(el){
    if(el.id.length>1){el.style.transform=v?'rotate(180deg)':'rotate(0)';}
  });
  Object.keys(open).forEach(function(k){open[k]=!!v;});
}
function unlock(){
  var p=document.getElementById("pwd").value;
  if(p==="AZ2026!"){
    document.getElementById("lockscreen").style.display="none";
    document.getElementById("app").style.display="block";
    run();
  }else{
    document.getElementById("err").style.display="block";
    document.getElementById("pwd").value="";
  }
}
function run(){
  var fb=document.getElementById('fb').value;
  var fa=document.getElementById('fa').value;
  var fs=document.getElementById('fs').value;
  var fq=document.getElementById('fq').value.toLowerCase().trim();
  var list=[];
  for(var i=0;i<P.length;i++){
    var p=P[i];
    if(fb&&p.brand!==fb)continue;
    if(fa!==''){var d=days(p.found_at);if(d>parseInt(fa))continue;}
    if(fq){var h=(p.title+' '+p.brand).toLowerCase();if(h.indexOf(fq)===-1)continue;}
    list.push(p);
  }
  list.sort(function(a,b){
    if(fs==='new')return new Date(b.found_at)-new Date(a.found_at);
    if(fs==='old')return new Date(a.found_at)-new Date(b.found_at);
    if(fs==='pa')return pri(a.price)-pri(b.price);
    if(fs==='pd')return pri(b.price)-pri(a.price);
    return a.brand.localeCompare(b.brand);
  });
  var byB={};
  list.forEach(function(p){if(!byB[p.brand])byB[p.brand]=[];byB[p.brand].push(p);});
  var brs=Object.keys(byB).sort(function(a,b){return a.localeCompare(b);});
  var html='';
  brs.forEach(function(br,i){
    var id='br'+i;
    var prods=byB[br];
    var nc=prods.filter(function(p){return N.indexOf(p.handle)!==-1;}).length;
    if(open[id]===undefined)open[id]=true;
    var nb=nc>0?'<span class="bnew">+'+nc+' nuevos</span>':'';
    html+='<div class="bsec">'
      +'<div class="bhdr" data-idx="'+idx+'" onclick="tog(this)">'
      +'<div class="bhl"><span class="bnm">'+br+'</span><span class="bcnt">'+prods.length+'</span>'+nb+'</div>'
      +'<span class="barr" id="a'+idx+'" style="transform:'+(open[id]?'rotate(180deg)':'rotate(0)')+'">&#9660;</span>'
      +'</div>'
      +'<div class="bbody" id="b'+idx+'" style="display:'+(open[id]?'block':'none')+'">'
      +'<div class="grid">'+prods.map(card).join('')+'</div>'
      +'</div></div>';
  });
  document.getElementById('out').innerHTML=html||'<div class="empty">Sin resultados.</div>';
  document.getElementById('sm').textContent=list.length;
}
function reset(){
  document.getElementById('fb').value='';
  document.getElementById('fa').value='';
  document.getElementById('fs').value='new';
  document.getElementById('fq').value='';
  run();
}
run();
